name: Build and publish images

on:
  workflow_call:
    inputs:
      imagetag:
        description: "The image tag to use when publishing. Defaults to the branch or tag name that triggered the workflow."
        required: false
        type: string
        default: ""
      runner-version:
        description: "The version of the runner"
        required: false
        type: string
        default: "ubuntu-latest"
      build-images:
        description: "Comma-separated image names to build. Builds all images when empty."
        required: false
        type: string
        default: ""
      buildah-cache-ttl:
        description: "Maximum age for registry cache images used during the build"
        required: false
        type: string
        default: "168h"
      buildah-cache:
        description: "Enable Buildah registry cache"
        required: false
        type: boolean
        default: true
    outputs:
      images:
        description: "Built image names without tags"
        value: ${{ jobs.build-images.outputs.images }}
    secrets:
      netrcb64:
        description: "Netrc Base64-encoded file content for authenticated downloads"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    name: Build and publish images
    runs-on: ${{ inputs.runner-version }}
    outputs:
      images: ${{ steps.build.outputs.images }}
    env:
      IMAGETAG: ${{ inputs.imagetag }}
      BUILD_IMAGES: ${{ inputs.build-images }}
      BUILDAH_CACHE: ${{ inputs.buildah-cache }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/cache@v5
        with:
          path: ui/node_modules
          key: "yarn-${{ hashFiles('ui/yarn.lock') }}"

      - name: Prepare image environment
        run: |
          sanitize_cache_scope() {
            local value slug hash

            value="$1"
            slug=$(printf "%s" "${value}" \
              | tr "[:upper:]" "[:lower:]" \
              | sed -E "s/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g")
            slug="${slug:-ref}"
            slug="${slug:0:64}"
            hash=$(printf "%s" "${value}" | sha256sum | awk "{ print substr(\$1, 1, 12) }")
            printf "%s-%s" "${slug}" "${hash}"
          }

          repository_owner="${GITHUB_REPOSITORY_OWNER,,}"
          repository_name="${GITHUB_REPOSITORY#*/}"
          repository_name="${repository_name,,}"
          imagetag="${IMAGETAG:-${GITHUB_REF_NAME}}"
          imagetag="${imagetag:?}"
          imagetag="${imagetag//\//-}"
          {
            echo "REPOBASE=ghcr.io/${repository_owner}"
            echo "IMAGETAG=${imagetag}"
          } >> "$GITHUB_ENV"

          if [[ "${BUILDAH_CACHE}" == "true" ]]; then
            cache_base="ghcr.io/${repository_owner}/${repository_name}-cache"
            main_cache_repository="${cache_base}-{image}"
            cache_from=()
            cache_to=""

            if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
              pr_cache_repository="${cache_base}-pr-${PR_NUMBER:?}-{image}"
              cache_from=("${pr_cache_repository}" "${main_cache_repository}")
              if [[ "${PR_HEAD_REPOSITORY}" == "${GITHUB_REPOSITORY}" ]]; then
                cache_to="${pr_cache_repository}"
              fi
            elif [[ "${GITHUB_REF_TYPE}" == "tag" ||
                    "${GITHUB_REF_NAME}" == "main" ||
                    "${GITHUB_REF_NAME}" == "master" ]]; then
              cache_from=("${main_cache_repository}")
              cache_to="${main_cache_repository}"
            else
              cache_scope=$(sanitize_cache_scope "${GITHUB_REF_NAME}")
              branch_cache_repository="${cache_base}-branch-${cache_scope}-{image}"
              cache_from=("${branch_cache_repository}" "${main_cache_repository}")
              cache_to="${branch_cache_repository}"
            fi

            {
              echo "BUILDAH_CACHE_FROM=$(IFS=,; printf "%s" "${cache_from[*]}")"
              echo "BUILDAH_CACHE_TTL=${{ inputs.buildah-cache-ttl }}"
            } >> "$GITHUB_ENV"
            if [[ -n "${cache_to}" ]]; then
              echo "BUILDAH_CACHE_TO=${cache_to}" >> "$GITHUB_ENV"
            fi

            printf "Buildah cache-from: %s\n" "$(IFS=,; printf "%s" "${cache_from[*]}")"
            printf "Buildah cache-to: %s\n" "${cache_to:-disabled}"
          fi

      - name: Log in to container registry
        env:
          REGISTRY_TOKEN: ${{ github.token }}
        run: buildah login -u "${GITHUB_ACTOR}" --password-stdin ghcr.io <<<"${REGISTRY_TOKEN}"

      - name: Build module images
        id: build
        env:
          NETRC_B64: ${{ secrets.netrcb64 }}
        run: |
          if [[ -n "${NETRC_B64}" ]]; then
            ( umask 077; base64 -d <<<"${NETRC_B64}" > ~/.netrc )
          fi
          bash build-images.sh

      - name: Publish module images
        run: |
          trap 'buildah logout ghcr.io' EXIT
          images=(${{ steps.build.outputs.images }})
          urls=""
          for image in "${images[@]}" ; do
            buildah push "${image}" "docker://${image}:${IMAGETAG}"
            if [[ "${IMAGETAG}" == "main" || "${IMAGETAG}" == "master" ]]; then
              buildah push "${image}" "docker://${image}:latest"
            fi
            urls="${image}:${IMAGETAG} "$'\n'"${urls}"
          done
          echo "::notice title=Image URLs::${urls}"
